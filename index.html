<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mouche Volante</title>
  <meta name="description" content="Mouche Volante Animationen nach Hintergrundthemen.">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">Mouche Volante</p>
        <h1>Themen</h1>
      </div>
    </header>

    <section class="theme-grid" aria-label="Mouche Volante Themen">
      <a class="theme-card theme-sky" href="https://duselok.github.io/moucheVolante-sky/">
        <span class="theme-name">Sky</span>
        <span class="theme-meta">heller Himmel</span>
      </a>

      <a class="theme-card theme-lake" href="https://duselok.github.io/moucheVolante-lake/">
        <span class="theme-name">Lake</span>
        <span class="theme-meta">See und Ufer</span>
      </a>

      <a class="theme-card theme-office" href="https://duselok.github.io/moucheVolante-office/">
        <span class="theme-name">Office</span>
        <span class="theme-meta">Arbeitsplatz</span>
      </a>

      <a class="theme-card theme-market" href="https://duselok.github.io/moucheVolante-market/">
        <span class="theme-name">Marketstreet</span>
        <span class="theme-meta">Strasse und Markt</span>
      </a>

      <a class="theme-card theme-street" href="https://duselok.github.io/moucheVolante-street/">
        <span class="theme-name">Street</span>
        <span class="theme-meta">Ampelperspektive</span>
      </a>
    </section>
  </main>
</body>
</html>
